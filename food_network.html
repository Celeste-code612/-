            else { alpha=0.015; color='#c4b89a'; lw=0.35; }
        } else if (pinnedId) {
            if (l.source===pinnedId || l.target===pinnedId) { alpha=0.6; color='#c1443a'; lw=1.2; }
            else { alpha=0.015; color='#c4b89a'; lw=0.35; }
        } else if (srOn) {
            const both = searchSet.has(l.source) && searchSet.has(l.target);
            const any = searchSet.has(l.source) || searchSet.has(l.target);
            if (both) { alpha=0.45; color='#b8963e'; lw=1.0; }
            else if (any) { alpha=0.1; color='#b8a888'; lw=0.4; }
            else { alpha=0.015; color='#d0c8b0'; lw=0.25; }
        } else {
            alpha = 0.06 + l.strength*0.025;
            color = '#c4b89a';
            lw = 0.4;
        }
        if (alpha<0.005) return;
        const src=nById.get(l.source), tgt=nById.get(l.target);
        if(!src||!tgt) return;
        ctx.strokeStyle=color; ctx.globalAlpha=Math.min(1,alpha);
        ctx.lineWidth=Math.max(0.25, lw);
        ctx.beginPath(); ctx.moveTo(src._sx,src._sy); ctx.lineTo(tgt._sx,tgt._sy); ctx.stroke();
    });
    ctx.globalAlpha=1;

    // ---- Nodes ----
    D.nodes.forEach(n => {
        let alpha;
        if (hlOn) {
            if (n.id===hoverId) alpha=1;
            else if (hSet.has(n.id)) alpha=0.9;
            else alpha=0.06;
        } else if (pinnedId) {
            const pSet = adj.get(pinnedId);
            if (n.id===pinnedId) alpha=1;
            else if (pSet && pSet.has(n.id)) alpha=0.9;
            else alpha=0.06;
        } else if (srOn) {
            alpha = searchSet.has(n.id) ? 1 : 0.05;
        } else {
            alpha = 0.88;
        }
        if (alpha<0.02) return;

        ctx.globalAlpha=alpha;
        ctx.fillStyle=n.color;
        ctx.beginPath(); ctx.arc(n._sx, n._sy, n._sr, 0, Math.PI*2); ctx.fill();

        if (n._sr>4 && alpha>0.3) {
            ctx.strokeStyle='rgba(247,240,228,0.7)'; ctx.lineWidth=0.7;
            ctx.stroke();
        }
        if (n.id===hoverId || n.id===pinnedId) {
            ctx.strokeStyle = (n.id===pinnedId && !hoverId) ? '#60d0f0' : '#f0d060';
            ctx.lineWidth=2.5;
            ctx.beginPath(); ctx.arc(n._sx, n._sy, n._sr+3, 0, Math.PI*2); ctx.stroke();
        }
    });
    ctx.globalAlpha=1;

    // ---- Labels ----
    const pinnedSet = pinnedId ? adj.get(pinnedId) : null;
    const lbls = [];
    D.nodes.forEach(n => {
        let show = false;
        let alpha;
        if (pinnedId) {
            // Pin mode: only pinned node + its neighbors show labels
            if (n.id === pinnedId) { show=true; alpha=1; }
            else if (pinnedSet && pinnedSet.has(n.id)) { show=true; alpha=0.85; }
        } else if (hlOn) {
            if (n.id===hoverId) { show=true; alpha=1; }
            else if (hSet.has(n.id)) { show=true; alpha=0.85; }
        } else if (srOn) {
            if (searchSet.has(n.id)) { show=true; alpha=0.9; }
        } else {
            show = n.degree >= 3;
            alpha = 0.78;
        }
        if (!show) return;

        // Font size proportional to node radius, scales with zoom
        const fs = Math.max(5, n._sr * 0.85);
        lbls.push({ n, alpha, fs });
    });

    lbls.sort((a,b)=>a.n.degree-b.n.degree);
    lbls.forEach(({n,alpha,fs})=>{
        // Label centered on the node circle
        const x = n._sx;
        const y = n._sy;
        ctx.globalAlpha = alpha*0.9;
        ctx.font = fs+'px "Noto Serif SC","Songti SC","SimSun",serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // No shadow — clean text on light background
        ctx.fillStyle = (n.id===hoverId || n.id===pinnedId) ? '#c1443a' : '#3a3022';
        ctx.fillText(n.label, x, y);
    });
    ctx.globalAlpha=1;

    // Scale bar
    const barPx = 80;
    const dataDist = barPx / s;
    SL.textContent = dataDist.toFixed(3);
}

// ---- Mouse ----
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const nd = hit(mx,my);
    if (nd && hoverId!==nd.id) {
        hoverId=nd.id; canvas.style.cursor='pointer';
        ttN.textContent=nd.label; ttI.textContent='关联: '+nd.degree+' 种 | 聚类 '+nd.cluster;
        TT.classList.add('on'); draw();
    } else if (!nd && hoverId && !pinnedId) {
        hoverId=null; canvas.style.cursor='grab';
        TT.classList.remove('on'); draw();
    }
    if (nd) { TT.style.left=(e.clientX+20)+'px'; TT.style.top=(e.clientY-20)+'px'; }
});

canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const nd = hit(mx,my);
    if (nd) {
        // Click node: toggle pin (show only this node + neighbor labels)
        pinnedId = (pinnedId === nd.id) ? null : nd.id;
        draw();
    } else {
        // Click blank: clear everything
        pinnedId = null;
        searchQ=''; searchSet=null; SI.value=''; draw();
    }
});

// ---- Zoom (wheel) ----
canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;

    // World coords under mouse before zoom
    const s0 = V();
    const wx = (mx - Tx()) / s0;
    const wy = (my - Ty()) / s0;

    const f = e.deltaY<0 ? 1.12 : 1/1.12;
    zoom = Math.max(0.05, Math.min(8, zoom*f));

    // Adjust pan so world point stays under mouse
    const s1 = V();
    panX = mx - wx*s1 - (W/2 - cx()*s1);
    panY = my - wy*s1 - (H/2 - cy()*s1);

    updateSP();
    // Re-resolve collisions when zoom changes significantly
    if (Math.abs(zoom - lastResolveZoom) / lastResolveZoom > 0.2) {
        resolveCollisions(20);
    }
    draw();
}, {passive:false});

// ---- Pan (drag) ----
let drag=false, dsX,dsY, dpX,dpY;
canvas.addEventListener('mousedown', e => {
    if (e.button===0 && !hoverId) {
        drag=true; dsX=e.clientX; dsY=e.clientY; dpX=panX; dpY=panY;
        canvas.style.cursor='grabbing';
    }
});
window.addEventListener('mousemove', e => {
    if (!drag) return;
    panX=dpX+(e.clientX-dsX); panY=dpY+(e.clientY-dsY);
    updateSP(); draw();
});
window.addEventListener('mouseup', ()=>{
    if(drag){ drag=false; canvas.style.cursor=hoverId?'pointer':'grab'; }
});

// ---- Search ----
SI.addEventListener('input', ()=>{
    searchQ = SI.value.trim();
    if (!searchQ) { searchSet=null; draw(); return; }
    searchSet = new Set();
    const q = searchQ.toLowerCase();
    D.nodes.forEach(n => {
        if (n.label.toLowerCase().includes(q)) {
            searchSet.add(n.id);
            const nb = adj.get(n.id); if(nb) nb.forEach(x=>searchSet.add(x));
        }
    });
    draw();
});

// ---- Legend ----
document.getElementById('LT').addEventListener('click', ()=>{
    legendOn=!legendOn;
    const lp=document.getElementById('LP');
    lp.classList.toggle('show',legendOn);
    document.getElementById('LT').textContent=legendOn?'▾ 聚类图例':'▸ 聚类图例';
    if (legendOn && lp.children.length<=1) {
        const cn={};
        D.nodes.forEach(n=>{ if(!cn[n.cluster])cn[n.cluster]=[]; cn[n.cluster].push(n); });
        const sorted=Object.keys(cn).sort((a,b)=>{
            const sa=cn[a].reduce((s,n)=>s+n.degree,0);
            const sb=cn[b].reduce((s,n)=>s+n.degree,0);
            return sb-sa;
        });
        sorted.forEach(c=>{
            const ns=cn[c]; ns.sort((a,b)=>b.degree-a.degree);
            const top3=ns.slice(0,3).map(n=>n.label).join(' · ');
            const div=document.createElement('div');
            div.className='leg-item';
            div.innerHTML='<span class="leg-dot" style="background:'+ns[0].color+'"></span>'+c+': '+top3;
            lp.appendChild(div);
        });
    }
});

// ---- Resize ----
window.addEventListener('resize', ()=>{
    resize(); baseScale=fitScale(); updateSP(); draw();
});

// ---- Keyboard ----
window.addEventListener('keydown', e => {
    if (e.key==='0') { zoom=1; panX=0; panY=0; updateSP(); resolveCollisions(25); draw(); }
    if (e.key==='Escape') {
        pinnedId=null; searchQ=''; searchSet=null; SI.value=''; hoverId=null;
        TT.classList.remove('on'); draw();
    }
    if (e.key==='f' && !e.ctrlKey && !e.metaKey && document.activeElement!==SI) {
        SI.focus();
    }
});

// ---- Go ----
draw();
console.log('味脉简谱 VOSviewer 图谱 — '+D.nodes.length+' 节点, '+D.links.length+' 连线');
})();
</script>
</body>
